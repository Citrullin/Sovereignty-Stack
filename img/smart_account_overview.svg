<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1200" height="800"
     viewBox="0 0 1200 800"
     xmlns="http://www.w3.org/2000/svg">

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10"
            refX="10" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#333"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="40" font-size="26" text-anchor="middle"
        font-family="Arial" font-weight="bold">
    Crypto Native Cash - Key &amp; Account Architecture
  </text>

  <!-- On-chain boundary -->
  <rect x="50" y="80" width="700" height="600"
        fill="none" stroke="#000" stroke-width="2"/>
  <text x="400" y="110" font-size="18" text-anchor="middle"
        font-family="Arial" font-weight="bold">
    On-Chain (Smart Account / Account Abstraction)
  </text>

  <!-- Smart Account -->
  <rect x="150" y="150" width="500" height="200"
        rx="15" ry="15"
        fill="#f2f2f2" stroke="#000" stroke-width="2"/>
  <text x="400" y="180" font-size="16" text-anchor="middle"
        font-family="Arial" font-weight="bold">
    Smart Account Wallet
  </text>

  <text x="170" y="210" font-size="14" font-family="Arial">
    • Holds Stablecoins (ERC-20)
  </text>
  <text x="170" y="235" font-size="14" font-family="Arial">
    • Policy logic (thresholds, veto, freeze)
  </text>
  <text x="170" y="260" font-size="14" font-family="Arial">
    • Account Abstraction validation
  </text>

  <!-- Key B -->
  <rect x="150" y="380" width="220" height="140"
        rx="12" ry="12"
        fill="#e6f0ff" stroke="#000" stroke-width="2"/>
  <text x="260" y="410" font-size="15" text-anchor="middle"
        font-family="Arial" font-weight="bold">
    Authority
  </text>
  <text x="165" y="440" font-size="13" font-family="Arial">
    • Approve / reject transfers
  </text>
  <text x="165" y="465" font-size="13" font-family="Arial">
    • Freeze / revoke NFC key
  </text>
  <text x="165" y="490" font-size="13" font-family="Arial">
    • AML / policy enforcement
  </text>

  <!-- Key C -->
  <rect x="430" y="380" width="220" height="140"
        rx="12" ry="12"
        fill="#e8ffe8" stroke="#000" stroke-width="2"/>
  <text x="540" y="410" font-size="15" text-anchor="middle"
        font-family="Arial" font-weight="bold">
    Ownership
  </text>
  <text x="445" y="440" font-size="13" font-family="Arial">
    • On-chain ownership claim
  </text>
  <text x="445" y="465" font-size="13" font-family="Arial">
    • Transfer / reclaim funds
  </text>
  <text x="445" y="490" font-size="13" font-family="Arial">
    • Upgrade authority rules
  </text>

  <!-- Arrows from Keys to Smart Account -->
  <line x1="260" y1="380" x2="300" y2="350"
        stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="540" y1="380" x2="500" y2="350"
        stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Physical world boundary -->
  <rect x="800" y="80" width="350" height="600"
        fill="none" stroke="#000" stroke-width="2"/>
  <text x="975" y="110" font-size="18" text-anchor="middle"
        font-family="Arial" font-weight="bold">
    Physical World
  </text>

  <!-- NFC Tag -->
  <rect x="850" y="200" width="260" height="200"
        rx="20" ry="20"
        fill="#fff0e6" stroke="#000" stroke-width="2"/>
  <text x="975" y="235" font-size="16" text-anchor="middle"
        font-family="Arial" font-weight="bold">
    NFC Tag / Card
  </text>
  <text x="865" y="265" font-size="14" font-family="Arial">
    Physical Possession
  </text>
  <text x="865" y="290" font-size="13" font-family="Arial">
    • Private key written once
  </text>
  <text x="865" y="315" font-size="13" font-family="Arial">
    • Signs payment intents
  </text>
  <text x="865" y="340" font-size="13" font-family="Arial">
    • No ownership authority
  </text>

  <!-- Arrow from NFC to Smart Account -->
  <line x1="850" y1="300" x2="650" y2="260"
        stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Annotation -->
  <text x="600" y="720" font-size="14" text-anchor="middle"
        font-family="Arial" font-style="italic">
    Physical possession (Key A) is required for spending,
    but authority (Key B) and ownership (Key C) govern control.
  </text>

</svg>
