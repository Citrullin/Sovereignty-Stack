# README Generator Configuration
#
# This file drives tools/manifesto-scripts/generate_readmes.py (or equivalent).
# Never hardcode target directories or cross-references in scripts — edit here.
#
# Rule: Scripts are temporary (run from /tmp, never committed).
#       Config and templates are permanent (live in tools/).

