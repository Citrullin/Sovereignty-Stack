  - path: docs/a2a_telemetry
    title: "A2A Telemetry & Verification Logs"
    description: |
      The A2A telemetry system allows autonomous agents to audit the repository
      without human intermediary. The JSONL log tracks commit-to-invariant
      mappings over time. The chart_telemetry.py script visualizes verification
      velocity for the Auditor Agent.
    cross_refs:
      - concepts/verification/53_agentic_protocol_auditor.md
      - docs/architecture/A2A_COMMUNICATION_PROTOCOL.md

  - path: docs/pitch
    title: "Investment Pitch Materials"
    cross_refs:
      - concepts/README.md

  - path: docs/architecture/testing
    title: "BDD Testing Framework"
    description: |
      Gherkin .feature files define the sociological intent of the stack.
      They map directly to Rust FSM implementations and eventually TLA+
      formal specifications. This is the first layer of the Epistemological
      Pipeline.
    cross_refs:
      - software/identity-worker/tests/cucumber_test.rs
      - concepts/verification/52_formal_verification_and_physical_oracles.md

  - path: hardware
    title: "Hardware"
