  - path: software
    title: "Software"
    cross_refs:
      - concepts/verification/50_ai_auditor_and_decentralized_verification.md

  - path: software/mcp-server
    title: "MCP Server – Agentic Tool Interface"
    description: |
      A Model Context Protocol (MCP) server exposing tools for AI agents
      to interact with Yocto manifests, OCI registries, and the verification
      pipeline. This is the programmatic interface for the Agentic Auditor.
    cross_refs:
      - concepts/verification/53_agentic_protocol_auditor.md

  - path: software/meta-sovereignty
    title: "meta-sovereignty – Yocto Layer"
    description: |
      A Yocto/OpenEmbedded layer that compiles the identity-worker Rust
      binary into an embedded Linux image. This is the bridge between the
      software verification layer and physical deployment on constrained hardware.
    cross_refs:
      - concepts/verification/51_confidential_deployment_oci_surgery.md
      - concepts/architecture/08_l1_sahara_node.md

  - path: tools
    title: "Tools"
    description: |
      Permanent utilities for the Sovereignty Stack development workflow.
      One-shot generator scripts are run from /tmp and never committed.
      Only reusable tools with stable interfaces live here.
